name: Inventory Health Check

# Runs 3x/day to verify carucars.com is showing real inventory.
# On persistent failure, opens/updates a GitHub issue so Armani gets emailed.

on:
  schedule:
    - cron: '30 13 * * *'   # 9:30am ET
    - cron: '30 19 * * *'   # 3:30pm ET (after afternoon sync at 2:15pm ET)
    - cron: '30 1 * * *'    # 9:30pm ET (after evening sync at 8:15pm ET)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: inventory-health-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run health check
        id: check
        shell: bash
        run: |
          set +e
          python3 scripts/check-inventory-health.py > out.txt 2> err.txt
          echo "rc=$?" >> "$GITHUB_OUTPUT"
          cat out.txt
          cat err.txt >&2
          exit 0

      - name: Summary
        shell: bash
        run: |
          if [ "${{ steps.check.outputs.rc }}" = "0" ]; then
            cat out.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat err.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Open/update alert issue
        if: steps.check.outputs.rc != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE='[INVENTORY ALERT] CaruCars inventory pipeline broken'
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          BODY="Health check failed at $(date -u +%Y-%m-%dT%H:%M:%SZ).

          \`\`\`
          $(cat err.txt)
          \`\`\`

          Run: $RUN_URL"

          EXISTING=$(gh issue list --state open --search "\"$TITLE\" in:title" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY"
          fi
          exit 1

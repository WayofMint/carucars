<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#9b2c8e" stop-opacity="0.35">
        <animate attributeName="stop-color" values="#9b2c8e;#c2185b;#9b2c8e" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#dc2626" stop-opacity="0.25">
        <animate attributeName="stop-color" values="#dc2626;#9b2c8e;#dc2626" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7b1fa2" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <filter id="carGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Ambient glow behind car -->
  <ellipse cx="600" cy="380" rx="500" ry="150" fill="#9b2c8e" opacity="0.06" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.06;0.1;0.06" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Car group - sporty sedan silhouette -->
  <g filter="url(#carGlow)" transform="translate(100, 50)">
    <!-- Main body -->
    <path d="M120 380 L160 300 Q180 270 220 255 L380 230 Q420 222 460 225 L600 240 Q660 248 700 270 L780 310 Q820 325 850 340 L880 360 Q900 370 900 380 L120 380Z"
          fill="url(#bodyGrad)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.75;0.9" dur="4s" repeatCount="indefinite"/>
    </path>

    <!-- Roof line / glass -->
    <path d="M280 258 L400 235 Q440 228 480 232 L600 248 Q630 252 650 262 L580 265 Q520 255 440 252 L340 258 Z"
          fill="url(#glassGrad)"/>

    <!-- Hood highlight -->
    <path d="M650 268 L780 310 Q790 314 780 316 L660 285 Q650 278 650 268Z"
          fill="rgba(255,255,255,0.06)"/>

    <!-- Front wheel well -->
    <circle cx="750" cy="380" r="52" fill="rgba(10,10,20,0.5)"/>
    <circle cx="750" cy="380" r="42" fill="rgba(20,20,35,0.6)" stroke="rgba(155,44,142,0.3)" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="0 750 380" to="360 750 380" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="380" r="16" fill="rgba(30,30,50,0.8)"/>
    <!-- Spokes -->
    <g opacity="0.3">
      <line x1="750" y1="342" x2="750" y2="356" stroke="#9b2c8e" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 750 380" to="360 750 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="750" y1="342" x2="750" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(72 750 380)">
        <animateTransform attributeName="transform" type="rotate" from="72 750 380" to="432 750 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="750" y1="342" x2="750" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(144 750 380)">
        <animateTransform attributeName="transform" type="rotate" from="144 750 380" to="504 750 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="750" y1="342" x2="750" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(216 750 380)">
        <animateTransform attributeName="transform" type="rotate" from="216 750 380" to="576 750 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="750" y1="342" x2="750" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(288 750 380)">
        <animateTransform attributeName="transform" type="rotate" from="288 750 380" to="648 750 380" dur="3s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Rear wheel well -->
    <circle cx="260" cy="380" r="52" fill="rgba(10,10,20,0.5)"/>
    <circle cx="260" cy="380" r="42" fill="rgba(20,20,35,0.6)" stroke="rgba(155,44,142,0.3)" stroke-width="3">
      <animateTransform attributeName="transform" type="rotate" from="0 260 380" to="360 260 380" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="380" r="16" fill="rgba(30,30,50,0.8)"/>
    <g opacity="0.3">
      <line x1="260" y1="342" x2="260" y2="356" stroke="#9b2c8e" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0 260 380" to="360 260 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="260" y1="342" x2="260" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(72 260 380)">
        <animateTransform attributeName="transform" type="rotate" from="72 260 380" to="432 260 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="260" y1="342" x2="260" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(144 260 380)">
        <animateTransform attributeName="transform" type="rotate" from="144 260 380" to="504 260 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="260" y1="342" x2="260" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(216 260 380)">
        <animateTransform attributeName="transform" type="rotate" from="216 260 380" to="576 260 380" dur="3s" repeatCount="indefinite"/>
      </line>
      <line x1="260" y1="342" x2="260" y2="356" stroke="#9b2c8e" stroke-width="2" transform="rotate(288 260 380)">
        <animateTransform attributeName="transform" type="rotate" from="288 260 380" to="648 260 380" dur="3s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Headlight glow -->
    <ellipse cx="870" cy="355" rx="12" ry="8" fill="white" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="870" cy="355" rx="6" ry="4" fill="white" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Taillight -->
    <rect x="122" y="340" width="8" height="20" rx="3" fill="#dc2626" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Speed lines -->
    <g opacity="0.15">
      <line x1="30" y1="300" x2="90" y2="300" stroke="#c2185b" stroke-width="2" stroke-linecap="round">
        <animate attributeName="x1" values="30;10;30" dur="1.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0.1;0.3" dur="1.2s" repeatCount="indefinite"/>
      </line>
      <line x1="20" y1="330" x2="80" y2="330" stroke="#9b2c8e" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="x1" values="20;0;20" dur="0.9s" repeatCount="indefinite"/>
      </line>
      <line x1="40" y1="355" x2="95" y2="355" stroke="#c2185b" stroke-width="1.5" stroke-linecap="round">
        <animate attributeName="x1" values="40;15;40" dur="1.1s" repeatCount="indefinite"/>
      </line>
      <line x1="50" y1="370" x2="100" y2="370" stroke="#7b1fa2" stroke-width="1" stroke-linecap="round">
        <animate attributeName="x1" values="50;30;50" dur="0.8s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Body accent lines -->
    <path d="M200 340 L500 325 Q600 322 750 335" stroke="rgba(155,44,142,0.2)" stroke-width="1.5" fill="none"/>
    <path d="M180 360 L500 350 Q650 348 850 365" stroke="rgba(220,38,38,0.15)" stroke-width="1" fill="none"/>
  </g>

  <!-- Ground reflection -->
  <ellipse cx="600" cy="440" rx="400" ry="8" fill="rgba(155,44,142,0.08)">
    <animate attributeName="rx" values="400;380;400" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>

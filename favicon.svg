<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b2c8e">
        <animate attributeName="stop-color" values="#9b2c8e;#dc2626;#9b2c8e" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#dc2626">
        <animate attributeName="stop-color" values="#dc2626;#9b2c8e;#dc2626" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Car body -->
  <g filter="url(#glow)">
    <path d="M8 38 L14 28 Q16 25 20 24 L32 22 Q36 21 40 22 L48 26 Q52 28 54 30 L56 34 Q57 36 56 38 L8 38 Q7 36 8 38Z" fill="url(#carGrad)" opacity="0.95">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite"/>
    </path>
    <!-- Windshield -->
    <path d="M22 24 L30 22 Q34 21 38 22 L44 25 L36 25 Q32 24 28 25 Z" fill="rgba(255,255,255,0.25)"/>
    <!-- Front wheel -->
    <circle cx="19" cy="38" r="5.5" fill="#1a1a2e" stroke="url(#carGrad)" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0 19 38" to="360 19 38" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="19" cy="38" r="2" fill="#2d2d44"/>
    <!-- Rear wheel -->
    <circle cx="45" cy="38" r="5.5" fill="#1a1a2e" stroke="url(#carGrad)" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0 45 38" to="360 45 38" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="38" r="2" fill="#2d2d44"/>
    <!-- Headlight -->
    <ellipse cx="54" cy="33" rx="2" ry="1.5" fill="#fff" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="1.5s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Taillight -->
    <rect x="8" y="32" width="3" height="3" rx="1" fill="#ff3366" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Speed lines -->
    <line x1="2" y1="30" x2="6" y2="30" stroke="url(#carGrad)" stroke-width="1" opacity="0.5" stroke-linecap="round">
      <animate attributeName="x1" values="2;0;2" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="1" y1="34" x2="5" y2="34" stroke="url(#carGrad)" stroke-width="1" opacity="0.4" stroke-linecap="round">
      <animate attributeName="x1" values="1;-1;1" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="0.6s" repeatCount="indefinite"/>
    </line>
    <line x1="3" y1="37" x2="6" y2="37" stroke="url(#carGrad)" stroke-width="0.8" opacity="0.3" stroke-linecap="round">
      <animate attributeName="x1" values="3;1;3" dur="0.7s" repeatCount="indefinite"/>
    </line>
  </g>
  <!-- Ground shadow -->
  <ellipse cx="32" cy="45" rx="22" ry="3" fill="rgba(155,44,142,0.15)">
    <animate attributeName="rx" values="22;20;22" dur="2s" repeatCount="indefinite"/>
  </ellipse>
</svg>

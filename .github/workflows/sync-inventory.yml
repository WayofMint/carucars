name: Sync Inventory

# Pulls the latest DealerCenter CSV directly from Hostinger via FTP, builds
# inventory-data.js locally (no Hostinger PHP dependency), commits to main.
# Netlify auto-deploys on commit.
#
# FTP is the bulletproof path: no OPcache issues, no PHP write failures,
# no broken endpoints. Just: fetch CSV → parse → commit → deploy.

on:
  schedule:
    - cron: '0 */2 * * *'       # Every 2 hours (catches DC's 3x/day push quickly)
  workflow_dispatch:             # Manual trigger from Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download latest DealerCenter CSV via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # DealerCenter drops CSVs with predictable names: DealerCenter_YYYYMMDD_12327535.csv
          # Try today's date and walk back 7 days to find the newest that exists.
          # The file lives at the FTP root (which is /public_html chroot) — we list
          # that root and grep for any DealerCenter_* file.

          # First: list FTP root and look for CSVs
          LISTING=$(curl -sS --ftp-pasv --max-time 30 "ftp://82.25.87.207/" \
                    --user "$FTP_USER:$FTP_PASS")
          echo "FTP listing (first 20 lines):"
          echo "$LISTING" | head -20

          LATEST=$(echo "$LISTING" | grep -oE 'DealerCenter_[0-9]+_[0-9]+\.csv' | sort -u | tail -1)

          # Fallback: walk back 7 days trying constructed filenames
          if [ -z "$LATEST" ]; then
            echo "No CSV in FTP listing, trying constructed filenames..."
            for days_back in 0 1 2 3 4 5 6 7; do
              DATE=$(date -u -d "-${days_back} days" +%Y%m%d)
              FNAME="DealerCenter_${DATE}_12327535.csv"
              # Try to download; 0 bytes = doesn't exist
              curl -sS --ftp-pasv --max-time 20 "ftp://82.25.87.207/${FNAME}" \
                   --user "$FTP_USER:$FTP_PASS" -o /tmp/try.csv 2>/dev/null
              if [ -s /tmp/try.csv ] && [ "$(wc -c < /tmp/try.csv)" -gt 1000 ]; then
                LATEST="$FNAME"
                cp /tmp/try.csv dealercenter_feed.csv
                echo "Found via fallback: $FNAME"
                break
              fi
            done
          fi

          if [ -z "$LATEST" ]; then
            echo "::error::No DealerCenter CSV found. DC FTP push may be broken — contact Julius Pascua at Julius.Pascua@dealercenter.com (DCID 12327535)."
            exit 1
          fi

          echo "Latest CSV: $LATEST"
          echo "LATEST_CSV=$LATEST" >> "$GITHUB_ENV"

          # If fallback already downloaded, skip — otherwise fetch now
          if [ ! -s dealercenter_feed.csv ]; then
            curl -sS --ftp-pasv --max-time 30 "ftp://82.25.87.207/${LATEST}" \
              --user "$FTP_USER:$FTP_PASS" \
              -o dealercenter_feed.csv
          fi

          SIZE=$(wc -c < dealercenter_feed.csv)
          LINES=$(wc -l < dealercenter_feed.csv)
          echo "Downloaded: ${SIZE} bytes, ${LINES} lines"

          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::CSV too small (${SIZE} bytes) — download failed."
            exit 1
          fi

      - name: Build inventory-data.js
        run: python3 scripts/build_inventory.py

      - name: Validate output
        run: |
          if [ ! -f inventory-data.js ]; then
            echo "::error::inventory-data.js not created"
            exit 1
          fi

          COUNT=$(grep -c '"stock"' inventory-data.js || echo 0)
          echo "Built inventory-data.js with $COUNT vehicles"

          if [ "$COUNT" -lt 10 ]; then
            echo "::error::Only $COUNT vehicles — refusing to commit."
            exit 1
          fi

      - name: Commit if changed
        run: |
          # Clean up the temp CSV (don't commit it — .gitignore should catch this)
          rm -f dealercenter_feed.csv

          git config user.name "carucars-sync-bot"
          git config user.email "sync@carucars.com"

          if git diff --quiet inventory-data.js; then
            echo "No inventory changes."
            exit 0
          fi

          BEFORE=$(git show HEAD:inventory-data.js 2>/dev/null | grep -c '"stock"' || echo 0)
          AFTER=$(grep -c '"stock"' inventory-data.js)

          git add inventory-data.js
          git commit -m "Sync inventory: ${BEFORE} → ${AFTER} vehicles (from ${LATEST_CSV})"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## Inventory Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **CSV:** \`${LATEST_CSV:-unknown}\`" >> $GITHUB_STEP_SUMMARY
          if [ -f inventory-data.js ]; then
            COUNT=$(grep -c '"stock"' inventory-data.js || echo 0)
            echo "- **Vehicles:** ${COUNT}" >> $GITHUB_STEP_SUMMARY
          fi

name: Debug list

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install -qq -y lftp
      - env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open -u \"$FTP_USER\",\"$FTP_PASS\" ftp://82.25.87.207;
            cls -l;
            bye
          " | grep -E "\.php|\.csv" | sort

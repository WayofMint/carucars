name: Debug Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install -qq -y lftp curl

      - env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "=== FTP listing of inventory-feed.php ==="
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            open -u \"$FTP_USER\",\"$FTP_PASS\" ftp://82.25.87.207;
            cls -l inventory-feed.php;
            cat inventory-feed.php;
          " | head -25

      - run: |
          echo "=== HTTP to feed endpoints ==="
          for name in inventory-feed.php vehicles.php data.php health-check.php; do
            echo "--- $name ---"
            curl -sS -I "https://yellowgreen-emu-225498.hostingersite.com/$name" 2>&1 | head -3
          done

name: Sync Inventory

# Pulls the latest DealerCenter feed from Hostinger's /vehicles-1cd17316.php endpoint,
# wraps it as inventory-data.js, commits to main. Netlify auto-deploys the
# commit to carucars.com.
#
# Schedule: 3x/day shortly after DealerCenter's FTP push.

on:
  schedule:
    - cron: '15 12,18,0 * * *'   # ~8am, 2pm, 8pm ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch vehicles from Hostinger feed
        env:
          KEY: carucars-sync-2026-x9f4
        run: |
          curl -fsS --max-time 45 \
            "https://yellowgreen-emu-225498.hostingersite.com/vehicles-1cd17316.php?key=$KEY" \
            -o vehicles.json
          echo "Fetched $(wc -c < vehicles.json) bytes"

      - name: Validate
        run: |
          count=$(jq 'length' vehicles.json)
          echo "Vehicles: $count"
          if [ "$count" -lt 10 ]; then
            echo "::error::Only $count vehicles — refusing to commit."
            exit 1
          fi

      - name: Build inventory-data.js
        run: |
          count=$(jq 'length' vehicles.json)
          {
            echo "/* ============================================"
            echo "   CARU CARS — Inventory Data"
            echo "   Auto-generated from DealerCenter feed"
            echo "   $count vehicles"
            echo "   Built: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "   ============================================ */"
            echo ""
            printf 'const INVENTORY = '
            cat vehicles.json
            echo ';'
          } > inventory-data.js
          rm vehicles.json
          node -e "
            require('fs').readFileSync('inventory-data.js','utf8');
            eval(require('fs').readFileSync('inventory-data.js','utf8'));
            if (!Array.isArray(INVENTORY) || INVENTORY.length < 10) throw new Error('bad output');
            console.log('OK', INVENTORY.length, 'vehicles');
          "

      - name: Commit if changed
        run: |
          git config user.name "carucars-sync-bot"
          git config user.email "bot@wayofmint.com"
          if git diff --quiet inventory-data.js; then
            echo "No change."
            exit 0
          fi
          before=$(git show HEAD:inventory-data.js 2>/dev/null | grep -c '"stock":' || echo 0)
          after=$(grep -c '"stock":' inventory-data.js)
          git add inventory-data.js
          git commit -m "Sync inventory: $before → $after vehicles"
          git push

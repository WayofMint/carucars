name: Debug
on:
  workflow_dispatch:
jobs:
  c:
    runs-on: ubuntu-latest
    steps:
      - run: sudo apt-get install -qq -y lftp
      - env:
          U: ${{ secrets.FTP_USERNAME }}
          P: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            open -u \"$U\",\"$P\" ftp://82.25.87.207;
            cls -l check-sync.php;
            get check-sync.php -o /tmp/rem.php;
          "
          echo "=== FIRST 10 LINES ==="
          head -10 /tmp/rem.php
          echo "=== SIZE ==="
          wc -c /tmp/rem.php

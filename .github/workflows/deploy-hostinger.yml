name: Deploy to Hostinger

# Uploads PHP endpoints + static fallback assets to Hostinger via FTP.
# Skips pure inventory-data.js commits (those come from the sync workflow
# and don't need to hit Hostinger — Netlify serves that file directly).

on:
  push:
    branches: [main]
    paths-ignore:
      - 'inventory-data.js'
      - 'README.md'
      - '.github/workflows/sync-inventory.yml'
      - '.github/workflows/inventory-health-check.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Upload via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            set net:timeout 30;
            set net:max-retries 3;
            open -u \"$FTP_USER\",\"$FTP_PASS\" ftp://82.25.87.207;
            mirror --reverse --verbose --parallel=2 \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .claude/ \
              --exclude-glob .netlify/ \
              --exclude-glob backups/ \
              --exclude-glob scripts/ \
              --exclude-glob DealerCenter_*.csv \
              --exclude-glob dealercenter_feed.csv \
              --exclude-glob .DS_Store \
              --exclude-glob *.md \
              --exclude sync-log.txt \
              --exclude sync.lock \
              ./ /public_html/;
            bye
          "

name: Debug FTP Listing

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: List FTP tree
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            set net:timeout 30;
            open -u \"$FTP_USER\",\"$FTP_PASS\" ftp://82.25.87.207;
            pwd;
            ls -la;
            cd public_html && ls -la DealerCenter_* *.csv 2>/dev/null;
            bye
          "
